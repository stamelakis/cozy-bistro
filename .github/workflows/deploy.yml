name: Deploy to GitHub Pages

# Trigger on push to main and allow manual runs from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Minimum perms needed for the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; queue rather than cancel so an in-flight deploy finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      # Build the 2D version (root) into dist/
      - run: npm ci
      - run: npm run build
      # Build the 3D version (v2/) and copy it into dist/cozy-bistro-3d/
      # so the same Pages artifact serves both:
      #   /cozy-bistro/             -> 2D
      #   /cozy-bistro/cozy-bistro-3d/ -> 3D
      - run: npm ci --prefix v2
      - run: npm run --prefix v2 build
      - run: |
          mkdir -p dist/cozy-bistro-3d
          cp -r v2/dist/* dist/cozy-bistro-3d/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
