<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <title>Cozy Bistro 3D</title>
    <!-- Preload the login background so it starts downloading in
         parallel with the JS bundle instead of waiting for the
         LoginModal to construct + paint its style. Cuts the perceived
         "blank background" gap when the modal first appears. -->
    <link rel="preload" as="image" href="./login-bg.png" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1b1410;
        font-family: system-ui, -apple-system, sans-serif;
        color: #fff5dc;
        overflow: hidden;
        /* Stop the browser from hijacking touch drags as pull-to-refresh
           / overscroll bounce while the player pans or pinches the 3D
           view. */
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        width: 100vw;
        height: 100vh;
        /* dvh tracks the *visible* viewport as mobile browser chrome
           (URL bar) shows/hides, so the canvas never leaves a dead strip. */
        height: 100dvh;
      }
      /* The WebGL canvas must own all touch gestures (pan / pinch) — the
         browser default would scroll/zoom the page instead. UI panels keep
         their normal touch behaviour since this targets the canvas only. */
      #app canvas {
        touch-action: none;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">Loading Cozy Bistro 3D…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
