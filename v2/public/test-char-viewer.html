<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Test Character Viewer</title>
<style>
  body { margin: 0; background: #2a2f3a; overflow: hidden; font-family: system-ui, sans-serif; }
  #ui { position: fixed; top: 12px; left: 12px; z-index: 10; display: flex; gap: 6px; flex-wrap: wrap; }
  #ui button { padding: 7px 12px; cursor: pointer; border: 0; border-radius: 5px;
               background: #d8b98f; color: #2a2218; font-weight: 600; }
  #ui button:hover { background: #e8cda3; }
  #status { position: fixed; bottom: 12px; left: 12px; color: #a8e2a8;
            font: 12px ui-monospace, monospace; background: rgba(0,0,0,0.4);
            padding: 4px 8px; border-radius: 4px; }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
}}
</script>
</head>
<body>
<div id="ui"></div>
<div id="status">loading…</div>
<script type="module">
import * as THREE from "three";
import { FBXLoader } from "three/addons/loaders/FBXLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const status = document.getElementById("status");
const ui = document.getElementById("ui");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2f3a);
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 100);
camera.position.set(2.4, 1.7, 3.0);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.9, 0);
controls.update();

scene.add(new THREE.HemisphereLight(0xffffff, 0x445566, 1.2));
const dir = new THREE.DirectionalLight(0xffffff, 1.6);
dir.position.set(3, 5, 2);
scene.add(dir);
scene.add(new THREE.GridHelper(6, 12, 0x6a7280, 0x444a55));

const FILES = [
  { name: "walking",     file: "walking.fbx" },
  { name: "sittingIdle", file: "sitting-idle.fbx" },
  { name: "standToSit",  file: "stand-to-sit.fbx" },
  { name: "sitToStand",  file: "sit-to-stand.fbx" },
];

let mixer = null;
const actions = {};
let current = null;

function play(name) {
  const a = actions[name];
  if (!a) return;
  a.reset();
  a.setLoop(THREE.LoopRepeat, Infinity);
  a.play();
  if (current && current !== a) current.crossFadeTo(a, 0.3, false);
  current = a;
}

try {
  const loader = new FBXLoader();
  const fbxs = await Promise.all(FILES.map((f) => loader.loadAsync(`assets/test-char/${f.file}`)));
  const body = fbxs[0];
  body.scale.setScalar(0.01);
  body.updateWorldMatrix(true, true);
  const box = new THREE.Box3().setFromObject(body);
  if (Number.isFinite(box.min.y)) body.position.y -= box.min.y;
  scene.add(body);

  mixer = new THREE.AnimationMixer(body);
  FILES.forEach((f, i) => {
    const clip = fbxs[i].animations[0];
    if (clip) { clip.name = f.name; actions[f.name] = mixer.clipAction(clip); }
  });

  FILES.forEach((f) => {
    if (!actions[f.name]) return;
    const b = document.createElement("button");
    b.textContent = f.name;
    b.onclick = () => play(f.name);
    ui.appendChild(b);
  });

  const size = box.getSize(new THREE.Vector3());
  status.textContent = `OK — ${Object.keys(actions).length} clips · height ${size.y.toFixed(2)}m · drag to orbit`;
  play("walking");
} catch (e) {
  status.textContent = "ERROR: " + (e && e.message ? e.message : e);
  console.error(e);
}

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();
  if (mixer) mixer.update(dt);
  controls.update();
  renderer.render(scene, camera);
});
addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
